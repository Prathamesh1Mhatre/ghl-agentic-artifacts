<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/theme.css' | relative_url }}?v=2">
  <link rel="stylesheet" href="{{ '/assets/css/v8-layout.css' | relative_url }}?v=2">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- SEO -->
  {% seo %}
</head>
<body>
  <div class="layout">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <a href="{{ '/' | relative_url }}" class="logo">
          <svg width="32" height="32" viewBox="0 0 36 36" fill="none">
            <title>Agentic Workspace</title>
            <path d="M18 2C9.163 2 2 9.163 2 18s7.163 16 16 16 16-7.163 16-16S26.837 2 18 2z" fill="#155EEF" />
            <path d="M18 18L28.142 7.858A15.91 15.91 0 0 1 34 18h-16z" fill="#ffffff" />
            <line x1="28" y1="8" x2="33" y2="3" stroke="#155EEF" stroke-width="1.5" stroke-linecap="round" />
            <line x1="30" y1="12" x2="35" y2="9" stroke="#155EEF" stroke-width="1.5" stroke-linecap="round" />
          </svg>
          <div class="logo-text">Agentic Artifacts</div>
          <span class="logo-badge">Beta</span>
        </a>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg class="theme-icon sun-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        <svg class="theme-icon moon-icon" style="display: none;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
      </button>
    </header>

    <!-- Sidebar -->
    {% include sidebar.html %}

    <!-- Main Content -->
    <main class="main-content">
      {{ content }}
    </main>

    <!-- Table of Contents (if page has TOC) -->
    {% if page.layout == 'artifact' %}
    <aside class="toc-right">
      <h3 class="toc-heading">On This Page</h3>
      <div id="toc"></div>
    </aside>
    {% endif %}
  </div>

  <!-- Theme Toggle Script -->
  <script src="{{ '/assets/js/theme-toggle.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/sidebar.js' | relative_url }}"></script>
</body>
</html>
